<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndroidDev — 개발자 커뮤니티</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" onerror="window.__sbLoadFailed=true"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   TOKENS
═══════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:        #07090f;
  --bg2:       #0c0f1a;
  --bg3:       #111520;
  --bg4:       #171c2e;
  --bg5:       #1d2438;
  --border:    #1e2640;
  --border2:   #273252;
  --border3:   #334070;
  --text:      #e6eeff;
  --text2:     #7b96c4;
  --text3:     #374c6e;
  --accent:    #4f8ef7;
  --accent2:   #38e0f5;
  --accentG:   rgba(79,142,247,.18);
  --accentGl:  rgba(79,142,247,.08);
  --green:     #22e0a0;
  --greenD:    rgba(34,224,160,.12);
  --red:       #f05555;
  --redD:      rgba(240,85,85,.12);
  --yellow:    #f7c040;
  --yellowD:   rgba(247,192,64,.1);
  --purple:    #a07cf5;
  --purpleD:   rgba(160,124,245,.1);
  --orange:    #f0834a;
  --pink:      #e87ec8;
  --r:10px;
  --r2:8px;
  --r3:6px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --shadow2:0 8px 40px rgba(0,0,0,.6);
  --transition:.14s ease;
}
[data-theme="light"]{
  --bg:#f2f5fc;--bg2:#ffffff;--bg3:#eaeff8;--bg4:#e0e8f5;--bg5:#d5dff0;
  --border:#d0daea;--border2:#b4c4dd;--border3:#8fa8cc;
  --text:#0d1829;--text2:#4a6285;--text3:#96afc8;
  --accent:#2a68d8;--accent2:#0ba8c5;--accentG:rgba(42,104,216,.14);--accentGl:rgba(42,104,216,.06);
  --green:#0db87a;--greenD:rgba(13,184,122,.1);
  --red:#d93a3a;--redD:rgba(217,58,58,.1);
  --yellow:#c48500;--yellowD:rgba(196,133,0,.1);
  --purple:#6a42d8;--purpleD:rgba(106,66,216,.1);
  --orange:#c85020;--pink:#b83a98;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
#app{display:flex;height:100vh;overflow:hidden;position:relative}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

/* ═══════════════════════════════
   UTILITY
═══════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 15px;border:none;border-radius:var(--r2);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all var(--transition);white-space:nowrap;text-decoration:none;letter-spacing:-.1px;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#3ad4f0);color:#fff;box-shadow:0 2px 14px var(--accentG)}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 22px rgba(79,142,247,.4)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accentGl)}
.btn-danger{background:var(--redD);border:1px solid rgba(240,85,85,.25);color:var(--red)}
.btn-danger:hover{background:rgba(240,85,85,.22)}
.btn-green{background:var(--greenD);border:1px solid rgba(34,224,160,.25);color:var(--green)}
.btn-green:hover{background:rgba(34,224,160,.2)}
.btn-icon{width:32px;height:32px;padding:0;border-radius:var(--r3)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:var(--r3)}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:5px}
.btn-full{width:100%}
.inp{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:all var(--transition)}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentGl)}
.inp::placeholder{color:var(--text3)}
.inp-err{border-color:rgba(240,85,85,.5)!important;box-shadow:0 0 0 3px rgba(240,85,85,.07)!important}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.field{margin-bottom:16px}
.field:last-of-type{margin-bottom:0}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge-blue{background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.22)}
.badge-green{background:var(--greenD);color:var(--green);border:1px solid rgba(34,224,160,.22)}
.badge-yellow{background:var(--yellowD);color:var(--yellow);border:1px solid rgba(247,192,64,.22)}
.badge-red{background:var(--redD);color:var(--red);border:1px solid rgba(240,85,85,.22)}
.badge-purple{background:var(--purpleD);color:var(--purple);border:1px solid rgba(160,124,245,.22)}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ═══════════════════════════════
   AUTH
═══════════════════════════════ */
.auth-wrap{display:flex;align-items:center;justify-content:center;width:100%;min-height:100vh;background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(79,142,247,.14),transparent)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px;width:430px;max-width:calc(100vw - 32px);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green),var(--purple),var(--pink))}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-mark{width:62px;height:62px;border-radius:16px;background:linear-gradient(135deg,#1a3060,#0a1832);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 4px 24px rgba(79,142,247,.2)}
.auth-title{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--text)}
.auth-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:12px;color:var(--text2);margin-top:4px}
.auth-tabs{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:22px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all var(--transition);font-weight:600}
.auth-tab.on{background:var(--bg2);color:var(--text);border:1px solid var(--border2);box-shadow:var(--shadow)}
.err-box{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;background:rgba(240,85,85,.07);border:1px solid rgba(240,85,85,.2);border-radius:8px;font-size:12px;color:var(--red);margin-top:10px}
.ok-box{padding:10px 13px;background:rgba(34,224,160,.07);border:1px solid rgba(34,224,160,.2);border-radius:8px;font-size:12px;color:var(--green);margin-top:10px}
.auth-footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}
.auth-footer a{color:var(--accent);text-decoration:none}
.strength-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all .3s}

/* ═══════════════════════════════
   SIDEBAR
═══════════════════════════════ */
.sidebar{width:236px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10}
.sb-top{padding:13px 12px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:900;letter-spacing:-.4px;flex:1}
.logo-text span{color:var(--accent)}
.user-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--transition)}
.user-row:hover{background:var(--bg3)}
.ava{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;position:relative}
.ava-lg{width:36px;height:36px;border-radius:10px;font-size:15px}
.ava-xl{width:50px;height:50px;border-radius:13px;font-size:21px}
.ava-badge{position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}
.uname{font-size:13px;font-weight:600;color:var(--text)}
.status-text{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:135px;margin-top:1px}

/* search */
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border);position:relative}
.sb-si{width:100%;padding:7px 10px 7px 29px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:all var(--transition)}
.sb-si:focus{border-color:var(--border2)}
.sb-si::placeholder{color:var(--text3)}
.sb-si-icon{position:absolute;left:19px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);pointer-events:none}

/* rooms list */
.rooms-list{flex:1;overflow-y:auto;padding:6px 7px}
.sec-label{padding:9px 7px 3px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;justify-content:space-between}
.room-li{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r2);cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:1px;transition:all var(--transition);position:relative}
.room-li:hover{background:var(--bg3);color:var(--text)}
.room-li.on{background:linear-gradient(135deg,rgba(79,142,247,.13),rgba(56,224,245,.06));color:var(--accent)}
.room-li.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.room-hash{color:var(--text3);font-weight:700;font-size:14px;flex-shrink:0}
.room-li.on .room-hash{color:var(--accent2)}
.rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.room-unread{min-width:18px;height:18px;border-radius:9px;padding:0 5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.join-pill{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.2);font-weight:700;flex-shrink:0}
.sb-bottom{padding:9px 7px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}

/* ═══════════════════════════════
   MAIN
═══════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.chat-header{padding:0 18px;height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0}
.ch-info{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.ch-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ch-hash{color:var(--text3);font-size:16px}
.ch-div{width:1px;height:18px;background:var(--border);flex-shrink:0}
.ch-desc{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.hdr-online{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;padding:0 3px}
.hdr-online::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}

/* ═══════════════════════════════
   MESSAGES
═══════════════════════════════ */
.msgs-wrap{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:0}
.msg{display:flex;gap:11px;padding:4px 9px;border-radius:10px;transition:background var(--transition);position:relative;group:true}
.msg:hover{background:rgba(255,255,255,.022)}
[data-theme="light"] .msg:hover{background:rgba(0,0,0,.022)}
.msg.pinned{background:rgba(247,192,64,.035);border-left:2px solid var(--yellow);border-radius:0 10px 10px 0;padding-left:7px}
.msg.highlight-flash{background:rgba(247,192,64,.12)!important;transition:background 2s ease!important}
.msg-left{flex-shrink:0;padding-top:2px}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:7px;margin-bottom:2px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:700;cursor:pointer}
.msg-name:hover{text-decoration:underline}
.msg-name.owner{color:var(--yellow)}
.msg-name.vice_owner{color:var(--green)}
.role-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;letter-spacing:.3px}
.rt-owner{background:var(--yellowD);color:var(--yellow);border:1px solid rgba(247,192,64,.22)}
.rt-vice{background:var(--greenD);color:var(--green);border:1px solid rgba(34,224,160,.22)}
.msg-time{font-size:10px;color:var(--text3)}
.msg-text{font-size:13px;line-height:1.78;color:var(--text);word-break:break-word}
.msg-text strong{font-weight:700}
.msg-text em{font-style:italic;color:var(--text2)}
.msg-text u{text-decoration:underline;text-underline-offset:2px}
.msg-text del{text-decoration:line-through;opacity:.5}
.mention{color:var(--accent2);background:rgba(56,224,245,.1);border-radius:3px;padding:0 3px;font-weight:600;cursor:pointer}
.mention:hover{background:rgba(56,224,245,.2)}
.code-inline{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg4);border:1px solid var(--border2);padding:1px 5px;border-radius:4px;color:var(--accent2)}
.code-block{font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-top:5px;overflow-x:auto;color:#6ae0a0;white-space:pre;position:relative}
[data-theme="light"] .code-block{color:#1a7a3a;background:#f0f8f4}
.code-block-lang{position:absolute;top:7px;right:11px;font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.msg-actions{position:absolute;right:9px;top:3px;display:none;gap:2px;align-items:center;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:3px;box-shadow:var(--shadow)}
.msg:hover .msg-actions{display:flex}
.msg-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.file-chip{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);font-size:12px;color:var(--text2);text-decoration:none;cursor:pointer;transition:all var(--transition)}
.file-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accentGl)}
.file-sz{font-size:10px;color:var(--text3)}
.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.reaction{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;cursor:pointer;font-size:12px;background:var(--bg3);border:1px solid var(--border);transition:all var(--transition)}
.reaction:hover{border-color:var(--accent);background:var(--accentGl)}
.reaction.mine{border-color:var(--accent);background:var(--accentGl);color:var(--accent)}
.reaction-count{font-size:11px;font-weight:600;color:var(--text2)}
.emoji-picker{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:10px;z-index:200;box-shadow:var(--shadow2)}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
.ep-btn{width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;transition:background var(--transition)}
.ep-btn:hover{background:var(--bg3)}
.date-div{display:flex;align-items:center;gap:10px;padding:12px 0 6px;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border)}
.pinned-banner{display:flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(247,192,64,.06);border-bottom:1px solid rgba(247,192,64,.13);font-size:12px;color:var(--yellow);cursor:pointer;transition:background var(--transition);flex-shrink:0}
.pinned-banner:hover{background:rgba(247,192,64,.11)}
.reply-ref{padding:4px 9px;margin-bottom:3px;border-left:2px solid var(--border2);color:var(--text3);font-size:11px;cursor:pointer;border-radius:0 5px 5px 0;display:flex;gap:5px;align-items:center}
.reply-ref:hover{background:var(--bg3)}

/* typing */
.typing-bar{padding:4px 16px;font-size:11px;color:var(--text3);min-height:22px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);animation:tdot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* ═══════════════════════════════
   INPUT
═══════════════════════════════ */
.inp-area{padding:9px 14px 13px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.reply-preview{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;font-size:12px;color:var(--text2);margin-bottom:0}
.rp-bar{width:3px;height:100%;background:var(--accent);border-radius:2px;flex-shrink:0;align-self:stretch}
.rp-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-pre{display:none;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.fp-item{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text2)}
.fp-rm{cursor:pointer;color:var(--red);margin-left:2px;opacity:.6;line-height:1;font-size:13px}
.fp-rm:hover{opacity:1}
.inp-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;gap:7px;padding:9px 12px;transition:border-color var(--transition)}
.inp-box:focus-within{border-color:var(--border2);box-shadow:0 0 0 3px var(--accentGl)}
.inp-box.has-reply{border-radius:0 0 12px 12px}
.inp-tools{display:flex;align-items:center;gap:2px;flex-shrink:0}
.chat-ta{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;resize:none;outline:none;max-height:150px;overflow-y:auto;font-family:inherit;line-height:1.65}
.chat-ta::placeholder{color:var(--text3)}
.inp-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.cc{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums}
.cc.warn{color:var(--yellow)}.cc.over{color:var(--red)}
.inp-hint{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--text3)}
.fmt-panel{display:none;margin-top:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.fmt-panel.open{display:block}
.fmt-title{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.fmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px}
.fmt-row{display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12px}
.fmt-code{font-family:'JetBrains Mono',monospace;color:var(--accent2);font-size:11px;background:rgba(56,224,245,.07);padding:1px 5px;border-radius:3px}

/* ═══════════════════════════════
   HOME
═══════════════════════════════ */
.home-page{flex:1;overflow-y:auto;padding:36px 28px}
.home-hero{margin-bottom:28px}
.home-title{font-size:28px;font-weight:900;letter-spacing:-.7px;line-height:1.15}
.home-title .grad{background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:13px;color:var(--text2);margin-top:7px}
.home-filters{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all var(--transition)}
.filter-btn.on{background:var(--accentGl);border-color:var(--accent);color:var(--accent)}
.filter-btn:hover:not(.on){border-color:var(--border2);color:var(--text)}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.room-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.room-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green));transform:scaleX(0);transition:transform .25s;transform-origin:left}
.room-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.room-card:hover::after{transform:scaleX(1)}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.rc-name{font-size:15px;font-weight:700;flex:1}
.rc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.rc-desc{font-size:12px;color:var(--text2);min-height:30px;margin-bottom:11px;line-height:1.55}
.rc-foot{display:flex;align-items:center;justify-content:space-between}
.rc-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.rc-members{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--green)}
.rc-members::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}

/* ═══════════════════════════════
   MEMBER PANEL
═══════════════════════════════ */
.members-panel{width:198px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--transition);overflow:hidden}
.members-panel.collapsed{width:0}
.mp-title{padding:13px 13px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mp-list{flex:1;overflow-y:auto;padding:6px}
.mp-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 7px 3px}
.mp-item{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer;transition:background var(--transition)}
.mp-item:hover{background:var(--bg3)}
.mp-uname{font-size:12px;font-weight:500;color:var(--text2)}
.mp-status{font-size:10px;color:var(--text3)}

/* ═══════════════════════════════
   SEARCH PANEL
═══════════════════════════════ */
.search-panel{position:absolute;top:52px;left:0;right:0;bottom:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;border-top:1px solid var(--border)}
.search-results{flex:1;overflow-y:auto;padding:14px}
.search-result-item{display:flex;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background var(--transition);border-bottom:1px solid var(--border)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--bg2)}
.sr-content{flex:1;min-width:0}
.sr-author{font-size:12px;font-weight:600;color:var(--text)}
.sr-text{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.sr-meta{font-size:10px;color:var(--text3);margin-top:2px}
.highlight{background:rgba(247,192,64,.24);color:var(--yellow);border-radius:2px;padding:0 2px}

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px;width:460px;max-width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:var(--shadow2)}
.modal-lg{width:560px}
.m-title{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text);display:flex;align-items:center;gap:8px}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.m-foot-l{display:flex;gap:8px;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.mem-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.mem-row:last-child{border-bottom:none}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:600}
.mem-role{font-size:11px;color:var(--text2);margin-top:1px}
.mem-acts{display:flex;gap:5px;flex-shrink:0}
.ban-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(240,85,85,.1)}
.ban-row:last-child{border-bottom:none}
.radio-g{display:flex;gap:16px;margin-top:7px}
.radio-l{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--text2)}
.radio-l input{accent-color:var(--accent)}
.radio-l:has(input:checked){color:var(--text)}
.profile-preview{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg3);border-radius:10px;margin-bottom:18px}
.ava-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.ava-swatch{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all var(--transition)}
.ava-swatch.on{border-color:#fff;transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.3)}
[data-theme="light"] .ava-swatch.on{border-color:var(--bg)}
.tag-cloud{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag-chip{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:4px}
.tag-chip:hover{border-color:var(--accent);color:var(--accent)}
.tag-chip.filter-active{border-color:var(--accent);color:var(--accent);background:var(--accentGl)}
.sql-pre{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:#6ae0a0;overflow:auto;white-space:pre;max-height:280px;margin:10px 0}
[data-theme="light"] .sql-pre{color:#1a7a3a}

/* mention suggestions */
.mention-box{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow2);z-index:100;min-width:200px;overflow:hidden}
.mention-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text2);transition:background var(--transition);display:flex;align-items:center;gap:8px}
.mention-item:hover{background:var(--bg3);color:var(--text)}

/* ═══════════════════════════════
   EMPTY
═══════════════════════════════ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:7px;color:var(--text2);text-align:center;padding:40px}
.empty-icon{font-size:48px;margin-bottom:5px;opacity:.55}
.empty-t{font-size:15px;font-weight:700;color:var(--text)}
.empty-s{font-size:12px;color:var(--text2);max-width:270px}

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 15px;font-size:13px;color:var(--text);z-index:500;box-shadow:var(--shadow2);opacity:0;transform:translateY(8px);transition:all .22s;max-width:310px;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(34,224,160,.3);background:rgba(34,224,160,.06)}
.toast.error{border-color:rgba(240,85,85,.3);background:rgba(240,85,85,.06)}
.toast.info{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.06)}
[data-tip]{position:relative}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text2);font-size:10px;white-space:nowrap;padding:3px 8px;border-radius:5px;pointer-events:none;opacity:0;transition:opacity .13s;z-index:100}
[data-tip]:hover::after{opacity:1}

/* ═══════════════════════════════
   SCROLL TO BOTTOM BTN
═══════════════════════════════ */
.scroll-bot-btn{position:absolute;right:16px;bottom:14px;width:34px;height:34px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);transition:all var(--transition);opacity:0;pointer-events:none;z-index:10}
.scroll-bot-btn.visible{opacity:1;pointer-events:auto}
.scroll-bot-btn:hover{background:var(--bg5);border-color:var(--accent)}

function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function avaBg(name,custom){
  if(custom)return custom;
  return AVA_COLORS[(name||'?').charCodeAt(0)%AVA_COLORS.length];
}
function ftime(ts){
  const d=new Date(ts),now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const t=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  return today.getTime()===md.getTime()?t:d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+t;
}
function fsize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function ficon(name){
  const e=(name.split('.').pop()||'').toLowerCase();
  const m={kt:'🔷',kts:'🔷',java:'☕',py:'🐍',js:'💛',ts:'💙',dart:'🎯',rs:'🦀',go:'🐹',zip:'📦',txt:'📝',xml:'📋',json:'📄',md:'📓',cpp:'⚡',c:'⚡',h:'📌',sh:'🖥️',gradle:'🔧',apk:'📱',aar:'📦',yml:'⚙️',yaml:'⚙️',so:'🔗',proto:'📡',log:'📋',csv:'📊',sql:'🗄️',html:'🌐',css:'🎨',jar:'☕',lock:'🔒',aab:'📦'};
  return m[e]||'📁';
}
function getFingerprint(){
  const c=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.platform||''].join('|');
  let h=0;for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h|=0;}
  return Math.abs(h).toString(36);
}
const FINGERPRINT=getFingerprint();

function toast(msg,type='success'){

}

/* ══════════════════
   TRANSLATION (MyMemory free API)
══════════════════ */
function guessTargetLang(){
  // Translate INTO the viewer's current UI language
  return S.lang||'ko';
}
async function translateMsg(msgId){
  const msg=S.msgs.find(m=>m.id===msgId);
  const text=msg?.content;
  if(!text||!text.trim())return;
  const target=guessTargetLang();
  S.translating={...S.translating,[msgId]:true};
  renderMsgs();
  try{
    const url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.slice(0,490))+'&langpair=autodetect|'+target;
    const res=await fetch(url);
    const json=await res.json();
    const translated=json?.responseData?.translatedText;
    const detected=json?.responseData?.detectedLanguage||json?.matches?.[0]?.source||'';
    if(translated){
      S.translations={...S.translations,[msgId]:{text:translated,from:detected,to:target}};
      S.showOriginal={...S.showOriginal,[msgId]:false};
    }else{
      toast('Translation failed','error');
    }
  }catch(e){
    console.error('translate error',e);
    toast('Translation failed','error');
  }finally{
    S.translating={...S.translating,[msgId]:false};
    renderMsgs();
  }
}
function toggleOriginal(msgId){
  const cur=!!S.showOriginal[msgId];
  S.showOriginal={...S.showOriginal,[msgId]:!cur};
  renderMsgs();
}
/* Lightweight script-based heuristic: guesses if `text` is NOT in the viewer's UI language,
   so we know whether to offer/auto-run translation. Not exact — just enough signal to act on. */
function detectScript(text){
  if(!text)return null;
  if(/[\uac00-\ud7af]/.test(text))return'ko';
  if(/[\u3040-\u30ff]/.test(text))return'ja';
  if(/[\u4e00-\u9fff]/.test(text))return'zh';
  if(/[\u0400-\u04ff]/.test(text))return'ru';
  if(/[\u0900-\u097f]/.test(text))return'hi';
  if(/[a-zA-Z]/.test(text))return'latin'; // en/es/fr/de/pt/vi all use latin script
  return null;
}
function shouldOfferTranslation(text){
  const script=detectScript(text);
  if(!script)return false;
  if(S.lang==='ko')return script!=='ko';
  if(S.lang==='ja')return script!=='ja';
  if(S.lang==='zh')return script!=='zh';
  if(S.lang==='ru')return script!=='ru';
  if(S.lang==='hi')return script!=='hi';
  // viewer's lang uses latin script (en/es/fr/de/pt/vi) — offer translation for non-latin scripts;
  // for latin-script messages we can't cheaply tell the exact language apart, so still offer it.
  return true;
}



/* ══════════════════
   TEXT FORMATTING
══════════════════ */
function fmt(text,searchQ){
  if(!text)return'';
  const toks=[];
  const colorPat=new RegExp('<('+COLORS.join('|')+'|#[0-9a-fA-F]{6})>"([^"\\n]*?)"','g');
  text=text.replace(colorPat,(_,color,content)=>{const idx=toks.length;toks.push({color,content});return'\x01'+idx+'\x01';});
  text=esc(text);
  // detect language for code blocks
  text=text.replace(/```([a-zA-Z]*)\n?([\s\S]+?)```/g,(_,lang,code)=>{
    const ext=lang.toLowerCase();
    const label=LANG_MAP[ext]||lang.toUpperCase()||'CODE';
    const labelHtml=label?`<span class="code-block-lang">${esc(label)}</span>`:'';
    return`<div class="code-block">${labelHtml}${esc(code).trimEnd()}</div>`;
  });
  text=text.replace(/`([^`\n]+?)`/g,'<span class="code-inline">$1</span>');
  text=text.replace(/\*\*\*([^\n*]{1,300}?)\*\*\*/g,'<strong><em>$1</em></strong>');
  text=text.replace(/\*\*([^\n*]{1,300}?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/_\*([^\n]{1,300}?)\*_/g,'<u>$1</u>');
  text=text.replace(/_([^\n_]{1,300}?)_/g,'<em>$1</em>');
  text=text.replace(/(?<![a-zA-Z0-9\u3131-\uD79D])-([^\n\-]{1,200}?)-(?![a-zA-Z0-9\u3131-\uD79D])/g,'<del>$1</del>');
  text=text.replace(/@([a-zA-Z0-9가-힣_()\-]{2,20})/g,'<span class="mention">@$1</span>');
  toks.forEach(({color,content},idx)=>{
    let inner=esc(content);
    inner=inner.replace(/\*\*([^\n*]+?)\*\*/g,'<strong>$1</strong>');
    inner=inner.replace(/_([^\n_]+?)_/g,'<em>$1</em>');
    text=text.split('\x01'+idx+'\x01').join(`<span style="color:${esc(color)}">${inner}</span>`);
  });
  if(searchQ){
    const re=new RegExp('('+esc(searchQ).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    text=text.replace(re,'<span class="highlight">$1</span>');
  }
  return text.replace(/\n/g,'<br>');
}

   AUTH
══════════════════ */
async function signUp(email,pw,uname){
  S.authErr='';S.authOk='';
  if(/\s/.test(uname)){S.authErr='닉네임에 공백을 사용할 수 없습니다.';render();return;}
  if(!/^[a-zA-Z0-9가-힣_()\-]{2,20}$/.test(uname)){S.authErr='닉네임: 2~20자, 한글/영문/숫자와 _ ( ) - 만 사용 가능';render();return;}
  if(pw.length<6){S.authErr='비밀번호는 6자 이상이어야 합니다.';render();return;}
  const {data:ex}=await SB.from('profiles').select('id').eq('username',uname).maybeSingle();
  if(ex){S.authErr='이미 사용 중인 닉네임입니다.';render();return;}
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){S.authErr='이 기기는 가입이 제한되어 있습니다.';render();return;}
  const {data,error}=await SB.auth.signUp({email,password:pw});
  if(error){S.authErr=error.message;render();return;}
  if(data?.user){
    await SB.from('profiles').insert({id:data.user.id,username:uname,ava_color:AVA_COLORS[0]});
    S.user=data.user;S.profile={id:data.user.id,username:uname,ava_color:AVA_COLORS[0]};
    await loadRooms();render();toast('가입 완료! 환영합니다 '+uname+'! 🎉');
  }else{S.authOk='확인 이메일을 발송했습니다.';render();}
}
async function signIn(email,pw){
  S.authErr='';
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){S.authErr='이 기기는 접근이 제한되어 있습니다.';render();return;}

}
async function signOut(){
  cleanup();await SB.auth.signOut();
  Object.assign(S,{user:null,profile:null,rooms:[],joined:[],room:null,msgs:[],members:[],bans:[],myRole:null,files:[],channel:null,presenceChannel:null,modal:null,onlineUsers:{},pinnedMsg:null,replyTo:null});
  render();
}
async function loadProfile(){
  if(!S.user)return;
  const {data}=await SB.from('profiles').select('*').eq('id',S.user.id).maybeSingle();
  S.profile=data;
}

/* ══════════════════
   ROOMS
══════════════════ */
async function loadRooms(){
  const {data,error}=await SB.from('rooms').select('*').order('created_at',{ascending:false});
  if(error){
    // Schema cache miss — reload and retry once
    if(error.code==='PGRST204'||error.message?.includes('schema cache')){
      await SB.rpc('pgrst_reload_schema').catch(()=>{});
      await new Promise(r=>setTimeout(r,1200));
      const {data:d2}=await SB.from('rooms').select('*').order('created_at',{ascending:false});
      S.rooms=d2||[];
    }else{
      console.error('loadRooms error:',error);S.rooms=[];
    }
  }else{S.rooms=data||[];}
  if(S.user){
    const {data:m}=await SB.from('room_members').select('room_id').eq('user_id',S.user.id);
    S.joined=(m||[]).map(x=>x.room_id);
  }
}

async function createRoom(name,desc,tags,themeColor,announcement,rules){
  // Ensure schema cache is fresh before insert
  const {data,error}=await SB.from('rooms')
    .insert({name:name.trim(),description:desc,owner_id:S.user.id,tags,theme_color:themeColor||'#4f8ef7',announcement:announcement||'',rules:rules||''})
    .select().single();
  if(error){
    let msg=error.message||'방 생성 실패';
    if(error.code==='PGRST204'||msg.includes('schema cache')||msg.includes('table')){
      msg='테이블을 찾을 수 없습니다. 설정 가이드(⚙️)에서 SQL을 먼저 실행해주세요.';
    }
    toast(msg,'error');return;
  }
  await SB.from('room_members').insert({room_id:data.id,user_id:S.user.id,role:'owner'});
  S.joined.push(data.id);S.rooms.unshift(data);S.modal=null;
  S.rulesAgreed[data.id]=true; // owner created the rules, no need to gate them
  await enter(data);toast('# '+name+' 방이 개설되었습니다! 🎉');
}

async function handleRoomClick(id){
  if(S.joined.includes(id)){const r=S.rooms.find(x=>x.id===id);if(r)await enter(r);}
  else{await joinRoom(id);}
}

async function joinRoom(id){
  const room=S.rooms.find(r=>r.id===id);if(!room)return;
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){toast('이 기기는 접근이 제한되어 있습니다.','error');return;}
  const {data:ban}=await SB.from('bans').select('*').eq('room_id',id).eq('user_id',S.user.id).maybeSingle();
  if(ban){
    if(ban.permanent){toast('이 방에서 영구 차단되었습니다.','error');return;}
    if(ban.expires_at&&new Date(ban.expires_at)>new Date()){toast('차단 중: '+new Date(ban.expires_at).toLocaleString('ko-KR')+'까지','error');return;}
    await SB.from('bans').delete().eq('id',ban.id);
  }
  const {data:ex}=await SB.from('room_members').select('id').eq('room_id',id).eq('user_id',S.user.id).maybeSingle();
  let isNewJoin=false;
  if(!ex){await SB.from('room_members').insert({room_id:id,user_id:S.user.id,role:'member'});S.joined.push(id);isNewJoin=true;}
  if(isNewJoin)await SB.from('room_events').insert({room_id:id,user_id:S.user.id,event_type:'join'});
  await enter(room);toast('# '+room.name+' 에 입장했습니다!');
}

/* Returns true if the room has rules text the user must accept before chatting */
function roomNeedsRulesGate(room){
  return !!(room?.rules&&room.rules.trim())&&!S.rulesAgreed[room.id];
}

async function enter(room){
  cleanup();
  S.room=room;S.msgs=[];S.members=[];S.bans=[];S.myRole=null;
  S.pinnedMsg=null;S.replyTo=null;S.onlineUsers={};S.events=[];
  delete S.unread[room.id];
  render();

  // Find when the current user joined this room — history before that point is hidden
  const {data:meRow}=await SB.from('room_members').select('role,joined_at').eq('room_id',room.id).eq('user_id',S.user.id).maybeSingle();
  S.myRole=meRow?.role||'member';
  S.joinedAt=meRow?.joined_at||null;

  await Promise.all([loadMsgs(room.id),loadMembers(room.id),loadBans(room.id),loadPinned(room.id),loadRoomEvents(room.id)]);

  if(roomNeedsRulesGate(room)){S.modal={t:'rulesGate'};}

  S.channel=SB.channel('room-'+room.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},async(e)=>{
      if(S.msgs.find(m=>m.id===e.new.id))return;
      setTimeout(async()=>{
        const {data:m}=await SB.from('messages').select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)').eq('id',e.new.id).maybeSingle();
        if(!m||S.msgs.find(x=>x.id===m.id))return;
        m.files=(m.files||[]).filter(f=>new Date(f.expires_at)>new Date());
        S.msgs.push(m);renderMsgs();scrollBot();
        const un=S.profile?.username||'';
        if(un&&m.content?.includes('@'+un)&&m.user_id!==S.user.id)toast('@멘션됨: '+m.profiles?.username,'info');
      },600);
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},async(e)=>{
      const idx=S.msgs.findIndex(m=>m.id===e.new.id);
      if(idx!==-1){
        const {data:m}=await SB.from('messages').select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)').eq('id',e.new.id).maybeSingle();
        if(m){m.files=(m.files||[]).filter(f=>new Date(f.expires_at)>new Date());S.msgs[idx]=m;renderMsgs();}
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},(e)=>{
      S.msgs=S.msgs.filter(m=>m.id!==e.old.id);renderMsgs();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'reactions',filter:'room_id=eq.'+room.id},()=>{setTimeout(loadMsgsReactions,300);})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'reactions',filter:'room_id=eq.'+room.id},()=>{setTimeout(loadMsgsReactions,300);})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'room_events',filter:'room_id=eq.'+room.id},async(e)=>{
      if(S.events.find(ev=>ev.id===e.new.id))return;
      const {data:prof}=await SB.from('profiles').select('username,ava_color').eq('id',e.new.user_id).maybeSingle();
      S.events.push({...e.new,profiles:prof});renderMsgs();scrollBot();
    })
    .subscribe();

  S.presenceChannel=SB.channel('presence-'+room.id,{config:{presence:{key:S.user.id}}})
    .on('presence',{event:'sync'},()=>{
      const state=S.presenceChannel.presenceState();
      S.onlineUsers={};
      Object.keys(state).forEach(k=>{if(state[k][0])S.onlineUsers[k]=state[k][0];});
      const mp=document.querySelector('.members-panel');if(mp)mp.outerHTML=rMembersPanel();
      const hdrOnline=document.getElementById('hdr-online');
      if(hdrOnline){const n=Object.keys(S.onlineUsers).length;hdrOnline.textContent=n+t('online');}
    })
    .subscribe(async(status)=>{
      if(status==='SUBSCRIBED')await S.presenceChannel.track({user_id:S.user.id,username:S.profile?.username,online_at:Date.now()});
    });

  render();setTimeout(()=>scrollBot(true),200);
}

async function loadRoomEvents(roomId){
  const {data}=await SB.from('room_events').select('*, profiles!room_events_user_id_fkey(username,ava_color)').eq('room_id',roomId).order('created_at',{ascending:true}).limit(200);
  S.events=data||[];
}

async function leaveRoom(){
  if(S.myRole==='owner'){toast('방장은 방을 나갈 수 없습니다.','error');return;}
  await SB.from('room_members').delete().eq('room_id',S.room.id).eq('user_id',S.user.id);
  await SB.from('room_events').insert({room_id:S.room.id,user_id:S.user.id,event_type:'leave'});
  S.joined=S.joined.filter(id=>id!==S.room.id);
  const name=S.room.name;cleanup();S.room=null;S.msgs=[];S.members=[];S.myRole=null;
  await loadRooms();render();toast('# '+name+' 에서 나갔습니다.');
}

async function updateRoom(name,desc,tags,themeColor,announcement,rules){
  const payload={name,description:desc,tags};
  if(themeColor!==undefined)payload.theme_color=themeColor;
  if(announcement!==undefined)payload.announcement=announcement;
  if(rules!==undefined)payload.rules=rules;
  const {error}=await SB.from('rooms').update(payload).eq('id',S.room.id);
  if(error){toast('업데이트 실패: '+error.message,'error');return;}
  S.room={...S.room,...payload};
  S.rooms=S.rooms.map(r=>r.id===S.room.id?S.room:r);
  S.modal=null;render();toast('방 설정이 저장되었습니다.');
}

async function deleteRoom(){
  if(!confirm('방과 모든 메시지를 삭제하시겠습니까?'))return;
  const id=S.room.id,name=S.room.name;
  await SB.from('rooms').delete().eq('id',id);
  cleanup();S.room=null;S.msgs=[];S.members=[];
  S.rooms=S.rooms.filter(r=>r.id!==id);S.joined=S.joined.filter(x=>x!==id);
  S.modal=null;render();toast('# '+name+' 방이 삭제되었습니다.');
}

/* ══════════════════
   MESSAGES
══════════════════ */
async function loadMsgs(roomId){
  let q=SB.from('messages').select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)').eq('room_id',roomId);
  // History gating: a member only sees messages sent from the moment they joined onward
  if(S.joinedAt)q=q.gte('created_at',S.joinedAt);
  const {data}=await q.order('created_at',{ascending:true}).limit(200);
  const now=new Date();
  S.msgs=(data||[]).map(m=>({...m,files:(m.files||[]).filter(f=>new Date(f.expires_at)>now)}));
  const el=document.getElementById('msgs');if(el)el.innerHTML=rMsgList();
}
async function loadMsgsReactions(){
  if(!S.room)return;const ids=S.msgs.map(m=>m.id);if(!ids.length)return;
  const {data}=await SB.from('reactions').select('*').in('message_id',ids);
  S.msgs=S.msgs.map(m=>({...m,reactions:(data||[]).filter(r=>r.message_id===m.id)}));
  renderMsgs();
}
async function loadPinned(roomId){
  const {data}=await SB.from('messages').select('*, profiles!messages_user_id_fkey(username,ava_color)').eq('room_id',roomId).eq('is_pinned',true).maybeSingle();
  S.pinnedMsg=data||null;
}

async function pinMsg(id,val){
  if(S.pinnedMsg&&S.pinnedMsg.id!==id)await SB.from('messages').update({is_pinned:false}).eq('id',S.pinnedMsg.id);
  await SB.from('messages').update({is_pinned:val}).eq('id',id);
  await loadPinned(S.room.id);
  S.msgs=S.msgs.map(m=>({...m,is_pinned:m.id===id?val:(m.id===S.pinnedMsg?.id?false:m.is_pinned)}));
  renderMsgs();renderPinnedBanner();
  toast(val?'📌 메시지가 고정되었습니다.':'고정 해제되었습니다.');
}

async function sendMsg(){
  if(S.sending)return;
  const el=document.getElementById('ci');
  const text=el?.value?.trim()||'';
  if(!text&&S.files.length===0)return;
  if(text.length>MAX_MSG){toast('메시지는 '+MAX_MSG+'자 이내로 작성하세요.','error');return;}
  const now=Date.now();
  const wait=Math.ceil((COOLDOWN-(now-S.lastSend))/1000);
  if(now-S.lastSend<COOLDOWN){toast(wait+'초 후에 보낼 수 있습니다.','error');return;}
  const {data:ban}=await SB.from('bans').select('*').eq('room_id',S.room.id).eq('user_id',S.user.id).maybeSingle();
  if(ban&&(ban.permanent||(ban.expires_at&&new Date(ban.expires_at)>new Date()))){toast('차단된 상태에서는 메시지를 보낼 수 없습니다.','error');return;}
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){toast('이 기기는 메시지 전송이 제한되어 있습니다.','error');return;}
  S.sending=true;S.lastSend=now;
  const btn=document.getElementById('send-btn');if(btn){btn.textContent='전송 중…';btn.disabled=true;}
  const insertData={room_id:S.room.id,user_id:S.user.id,content:text||(S.files.length>0?'(파일 첨부)':'')};
  if(S.replyTo)insertData.reply_to=S.replyTo.id;
  const {data:msg,error}=await SB.from('messages').insert(insertData).select().single();
  if(error){toast('전송 실패: '+error.message,'error');S.sending=false;if(btn){btn.textContent='전송 ↵';btn.disabled=false;}return;}
  if(S.files.length>0)await uploadFiles(msg.id,[...S.files]);
  S.files=[];S.replyTo=null;
  if(el){el.value='';el.style.height='auto';}
  updateCC('');
  const fp=document.getElementById('fp');if(fp){fp.innerHTML='';fp.style.display='none';}
  const rp=document.getElementById('rp');if(rp)rp.remove();
  const ib=document.querySelector('.inp-box');if(ib)ib.classList.remove('has-reply');
  S.sending=false;if(btn){btn.textContent='전송 ↵';btn.disabled=false;}
}

async function delMsg(id){
  if(!confirm('이 메시지를 삭제하시겠습니까?'))return;
  await SB.from('messages').delete().eq('id',id);
  S.msgs=S.msgs.filter(m=>m.id!==id);renderMsgs();
}

async function reactMsg(msgId,emoji){
  closeEmojiPicker();
  const existing=S.msgs.find(m=>m.id===msgId)?.reactions?.find(r=>r.user_id===S.user.id&&r.emoji===emoji);
  if(existing){await SB.from('reactions').delete().eq('id',existing.id);}
  else{await SB.from('reactions').insert({message_id:msgId,user_id:S.user.id,emoji,room_id:S.room.id});}
}

function openEmojiPicker(msgId,x,y){
  let ep=document.getElementById('ep');
  if(!ep){ep=document.createElement('div');ep.id='ep';ep.className='emoji-picker';document.body.appendChild(ep);}
  ep.innerHTML=`<div class="emoji-grid">${EMOJIS.map(e=>`<button class="ep-btn" onclick="reactMsg('${msgId}','${e}')">${e}</button>`).join('')}</div>`;
  const pw=218,ph=140;let px=x,py=y-ph-8;
  if(px+pw>window.innerWidth)px=window.innerWidth-pw-8;
  if(py<8)py=y+8;
  ep.style.cssText=`left:${px}px;top:${py}px;display:block;`;
  const closer=(e)=>{if(!ep.contains(e.target)){closeEmojiPicker();document.removeEventListener('click',closer);}};
  setTimeout(()=>document.addEventListener('click',closer),50);
}
function closeEmojiPicker(){const ep=document.getElementById('ep');if(ep)ep.style.display='none';}

function setReply(msg){
  S.replyTo=msg;
  const ia=document.querySelector('.inp-area');if(!ia)return;
  let rp=document.getElementById('rp');
  if(!rp){rp=document.createElement('div');rp.id='rp';rp.className='reply-preview';ia.insertBefore(rp,ia.querySelector('.file-pre')||ia.querySelector('.inp-box'));}
  const ib=document.querySelector('.inp-box');if(ib)ib.classList.add('has-reply');
  rp.innerHTML=`<div class="rp-bar"></div>
    <div class="rp-text"><strong style="color:var(--accent2)">@${esc(msg.profiles?.username||'?')}</strong>에게 답장 — ${esc((msg.content||'').slice(0,55))}</div>
    <button class="btn btn-ghost btn-xs" onclick="S.replyTo=null;document.getElementById('rp')?.remove();document.querySelector('.inp-box')?.classList.remove('has-reply')">✕</button>`;
  document.getElementById('ci')?.focus();
}

   SEARCH
══════════════════ */
async function searchMsgs(q){
  S.search=q;
  if(!q||q.length<2){S.searchResults=[];S.searchOpen=!!q;renderSearch();return;}
  S.searchOpen=true;
  const {data}=await SB.from('messages').select('*, profiles!messages_user_id_fkey(username,ava_color)').eq('room_id',S.room.id).ilike('content','%'+q+'%').limit(30).order('created_at',{ascending:false});
  S.searchResults=data||[];renderSearch();
}

function renderSearch(){
  const existing=document.getElementById('search-panel');
  if(!S.searchOpen||!S.room){if(existing)existing.remove();return;}
  const results=S.searchResults;
  const html=results.length===0
    ?`<div class="empty" style="padding-top:60px"><div class="empty-icon">🔍</div><div class="empty-t">검색 결과 없음</div><div class="empty-s">"${esc(S.search)}"에 대한 메시지가 없습니다</div></div>`
    :results.map(m=>`<div class="search-result-item" onclick="jumpToMsg('${m.id}')">
        <div class="ava ava-lg" style="background:${avaBg(m.profiles?.username,m.profiles?.ava_color)}">${(m.profiles?.username||'?')[0].toUpperCase()}</div>
        <div class="sr-content"><div class="sr-author">${esc(m.profiles?.username||'?')}</div>
        <div class="sr-text">${fmt(m.content,S.search)}</div>
        <div class="sr-meta">${ftime(m.created_at)}</div></div>
      </div>`).join('');
  if(!existing){
    const panel=document.createElement('div');panel.id='search-panel';panel.className='search-panel';
    panel.innerHTML=`<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">${results.length}개 결과 — "${esc(S.search)}"</span>
      <button class="btn btn-ghost btn-sm" onclick="S.searchOpen=false;S.search='';document.getElementById('search-panel')?.remove()">✕ 닫기</button>
    </div><div class="search-results">${html}</div>`;
    const main=document.querySelector('.main');
    if(main){main.style.position='relative';main.appendChild(panel);}
  }else{
    existing.querySelector('.search-results').innerHTML=html;
    existing.querySelector('span').textContent=results.length+'개 결과 — "'+S.search+'"';
  }
}

function jumpToMsg(id){
  S.searchOpen=false;document.getElementById('search-panel')?.remove();
  const el=document.getElementById('m-'+id);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.add('highlight-flash');
    setTimeout(()=>el.classList.remove('highlight-flash'),2000);
  }
}

/* ══════════════════
   FILES
══════════════════ */
async function uploadFiles(msgId,files){
  for(const file of files){
    const safe=file.name.replace(/[^a-zA-Z0-9._\-]/g,'_');
    const path=S.room.id+'/'+msgId+'/'+Date.now()+'_'+safe;
    const {error:ue}=await SB.storage.from(BUCKET).upload(path,file);
    if(ue){console.error('Upload error:',ue);continue;}
    const {data:{publicUrl}}=SB.storage.from(BUCKET).getPublicUrl(path);
    await SB.from('files').insert({room_id:S.room.id,message_id:msgId,user_id:S.user.id,file_name:file.name,file_url:publicUrl,file_size:file.size,expires_at:new Date(Date.now()+FILE_TTL).toISOString()});
  }
}
function pickFiles(e){
  const chosen=Array.from(e.target.files);const room=MAX_FILES-S.files.length;let added=0;
  for(const f of chosen){
    if(added>=room){toast('파일은 최대 '+MAX_FILES+'개까지 첨부 가능합니다.','error');break;}
    const ext='.'+((f.name.split('.').pop()||'').toLowerCase());
    if(!EXTS.includes(ext)){toast('허용되지 않는 형식: '+f.name,'error');continue;}
    if(f.size>MAX_FILE){toast('100MB 초과: '+f.name,'error');continue;}
    S.files.push(f);added++;
  }
  e.target.value='';renderFilePre();
}
function rmFile(i){S.files.splice(i,1);renderFilePre();}
function renderFilePre(){
  const el=document.getElementById('fp');if(!el)return;
  el.style.display=S.files.length?'flex':'none';
  el.innerHTML=S.files.map((f,i)=>`<div class="fp-item">${ficon(f.name)} ${esc(f.name)}<span style="color:var(--text3)">${fsize(f.size)}</span><span class="fp-rm" onclick="rmFile(${i})">✕</span></div>`).join('');
}

/* File preview: fetches the raw text content for non-binary file types and shows it
   in a modal with Copy and Download actions. Blocked entirely for NO_PREVIEW_EXTS. */
async function previewFile(fid){
  let file=null;
  for(const msg of S.msgs){
    const found=(msg.files||[]).find(f=>f.id===fid);
    if(found){file=found;break;}
  }
  if(!file){toast('File not found','error');return;}
  const name=file.file_name,url=file.file_url;
  const ext='.'+((name.split('.').pop()||'').toLowerCase());
  if(NO_PREVIEW_EXTS.includes(ext)){toast(t('file_preview_blocked'),'info');return;}
  S.modal={t:'filePreview',name,url,loading:true,content:''};render();
  try{
    const res=await fetch(url);
    const text=await res.text();
    S.modal={t:'filePreview',name,url,loading:false,content:text};
  }catch(e){
    S.modal={t:'filePreview',name,url,loading:false,content:null,error:true};
  }
  render();
}
function copyFileContent(){
  const pre=document.getElementById('file-preview-content');
  if(!pre)return;
  navigator.clipboard.writeText(pre.textContent).then(()=>toast(t('copied')));
}

async function loadMembers(roomId){
  const {data}=await SB.from('room_members').select('*, profiles!room_members_user_id_fkey(username,ava_color)').eq('room_id',roomId);
  S.members=data||[];
}
async function loadBans(roomId){
  const {data}=await SB.from('bans').select('*, profiles!bans_user_id_fkey(username)').eq('room_id',roomId);
  S.bans=data||[];
}
async function banUser(uid,uname,perm,hours,deviceBan){
  const exp=perm?null:new Date(Date.now()+hours*3600000).toISOString();
  const {error}=await SB.from('bans').upsert({room_id:S.room.id,user_id:uid,banned_by:S.user.id,permanent:perm,expires_at:exp},{onConflict:'room_id,user_id'});
  if(error){toast('차단 실패: '+error.message,'error');return;}
  await SB.from('room_members').delete().eq('room_id',S.room.id).eq('user_id',uid);
  if(deviceBan){
    const {data:sess}=await SB.from('device_sessions').select('fingerprint').eq('user_id',uid).maybeSingle();
    if(sess?.fingerprint)await SB.from('device_bans').upsert({fingerprint:sess.fingerprint,banned_by:S.user.id,user_id:uid},{onConflict:'fingerprint'});
  }
  S.members=S.members.filter(m=>m.user_id!==uid);
  await loadBans(S.room.id);S.modal={t:'mb'};render();
  toast(uname+' '+(perm?'영구 차단':'기간 차단')+(deviceBan?' + 기기 차단':'')+' 완료');
}
async function unban(uid,uname){
  await SB.from('bans').delete().eq('room_id',S.room.id).eq('user_id',uid);
  await SB.from('device_bans').delete().eq('user_id',uid);
  S.bans=S.bans.filter(b=>b.user_id!==uid);render();toast(uname+' 차단 해제 완료');
}
async function setVice(uid,makeVice){
  const role=makeVice?'vice_owner':'member';
  await SB.from('room_members').update({role}).eq('room_id',S.room.id).eq('user_id',uid);
  S.members=S.members.map(m=>m.user_id===uid?{...m,role}:m);
  render();toast(makeVice?'⭐ 부방장 지정 완료':'부방장 해제 완료');
}
async function updateProfile(statusMsg,avaColor){
  const {error}=await SB.from('profiles').update({status_msg:statusMsg,ava_color:avaColor}).eq('id',S.user.id);
  if(error){toast('업데이트 실패','error');return;}
  S.profile={...S.profile,status_msg:statusMsg,ava_color:avaColor};
  S.modal=null;render();toast('프로필이 업데이트되었습니다.');
}

function handleMention(ta){
  const v=ta.value,pos=ta.selectionStart;
  const m=v.slice(0,pos).match(/@([a-zA-Z0-9가-힣_()\-]*)$/);
  if(m){
    const q=m[1].toLowerCase();
    const matches=S.members.filter(mem=>mem.profiles?.username?.toLowerCase().includes(q)&&mem.user_id!==S.user.id).slice(0,5);
    showMentionSuggestions(matches,ta);
  }else{closeMentionSuggestions();}
}
function showMentionSuggestions(members,ta){
  let box=document.getElementById('mention-box');
  if(!box){box=document.createElement('div');box.id='mention-box';box.className='mention-box';document.body.appendChild(box);}
  const rect=ta.getBoundingClientRect();
  box.style.cssText=`bottom:${window.innerHeight-rect.top+6}px;left:${rect.left}px;`;
  if(!members.length){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=members.map(m=>`<div class="mention-item" onclick="insertMention('${esc(m.profiles?.username||'')}')">
    <div class="ava" style="background:${m.profiles?.ava_color||avaBg(m.profiles?.username)};width:22px;height:22px;border-radius:5px;font-size:10px">${(m.profiles?.username||'?')[0].toUpperCase()}</div>
    <span style="font-weight:600">@${esc(m.profiles?.username||'')}</span>
    <span style="color:var(--text3);font-size:10px;margin-left:auto">${esc(m.role)}</span>
  </div>`).join('');
}
function closeMentionSuggestions(){const b=document.getElementById('mention-box');if(b)b.style.display='none';}
function insertMention(username){
  const ta=document.getElementById('ci');if(!ta)return;
  const v=ta.value,pos=ta.selectionStart;
  const newBefore=v.slice(0,pos).replace(/@[a-zA-Z0-9가-힣_()\-]*$/,'@'+username+' ');
  ta.value=newBefore+v.slice(pos);
  ta.focus();ta.setSelectionRange(newBefore.length,newBefore.length);
  closeMentionSuggestions();
}
