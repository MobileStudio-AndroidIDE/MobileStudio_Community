<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndroidDev — 개발자 커뮤니티</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Dark theme (default) */
  --bg:        #080c14;
  --bg2:       #0d1320;
  --bg3:       #111827;
  --bg4:       #1a2236;
  --bg5:       #1e2a3a;
  --border:    #1c2e47;
  --border2:   #263d5e;
  --border3:   #2f4f78;
  --text:      #e2eeff;
  --text2:     #7d9bbf;
  --text3:     #3d5c7a;
  --accent:    #3d8ef0;
  --accent2:   #29d6f5;
  --accentGlow:rgba(61,142,240,.2);
  --green:     #1fd9a0;
  --red:       #f05656;
  --yellow:    #f5b731;
  --purple:    #9d7df5;
  --orange:    #f07843;
  --pink:      #e879c0;
  --sbar:4px;
  --r:8px;
  --transition:.15s ease;
}
[data-theme="light"]{
  --bg:#f0f4fc;--bg2:#ffffff;--bg3:#eef2f9;--bg4:#e4eaf5;--bg5:#d9e2f0;
  --border:#ccd6e8;--border2:#adbdd6;--border3:#8aa5c4;
  --text:#0f1b2d;--text2:#4a6380;--text3:#8aa5c4;
  --accent:#2570dc;--accent2:#0ab4d1;--accentGlow:rgba(37,112,220,.12);
  --green:#0db882;--red:#d94040;--yellow:#d48b00;--purple:#7856e0;
  --orange:#d45f20;--pink:#c04fa0;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:14px;line-height:1.5;
}
#app{display:flex;height:100vh;overflow:hidden;position:relative}

/* scrollbar */
::-webkit-scrollbar{width:var(--sbar);height:var(--sbar)}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 16px;border:none;border-radius:var(--r);cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;transition:all var(--transition);
  white-space:nowrap;text-decoration:none;letter-spacing:-.1px;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 2px 16px var(--accentGlow);
}
.btn-primary:hover{box-shadow:0 4px 24px rgba(61,142,240,.35);filter:brightness(1.08)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accentGlow)}
.btn-danger{background:rgba(240,86,86,.1);border:1px solid rgba(240,86,86,.25);color:var(--red)}
.btn-danger:hover{background:rgba(240,86,86,.2)}
.btn-green{background:rgba(31,217,160,.1);border:1px solid rgba(31,217,160,.25);color:var(--green)}
.btn-green:hover{background:rgba(31,217,160,.2)}
.btn-icon{width:32px;height:32px;padding:0;border-radius:6px}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-full{width:100%}

.inp{
  width:100%;padding:10px 13px;background:var(--bg3);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:all var(--transition);
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentGlow)}
.inp::placeholder{color:var(--text3)}
.inp-err{border-color:rgba(240,86,86,.5)!important;box-shadow:0 0 0 3px rgba(240,86,86,.08)!important}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.field{margin-bottom:16px}
.field:last-of-type{margin-bottom:0}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px}
.badge-blue{background:rgba(61,142,240,.12);color:var(--accent);border:1px solid rgba(61,142,240,.2)}
.badge-green{background:rgba(31,217,160,.12);color:var(--green);border:1px solid rgba(31,217,160,.2)}
.badge-yellow{background:rgba(245,183,49,.12);color:var(--yellow);border:1px solid rgba(245,183,49,.2)}
.badge-red{background:rgba(240,86,86,.12);color:var(--red);border:1px solid rgba(240,86,86,.2)}
.badge-purple{background:rgba(157,125,245,.12);color:var(--purple);border:1px solid rgba(157,125,245,.2)}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}

.sep{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
.auth-wrap{
  display:flex;align-items:center;justify-content:center;
  width:100%;min-height:100vh;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(61,142,240,.12),transparent);
}
.auth-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:18px;padding:36px;width:420px;
  max-width:calc(100vw - 32px);position:relative;overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--green),var(--purple),var(--pink));
}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-mark{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,#1a3a6e,#0d2040);
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin:0 auto 12px;
  box-shadow:0 4px 24px rgba(61,142,240,.2);
}
.auth-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.auth-title span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-sub{font-size:12px;color:var(--text2);margin-top:4px}
.auth-tabs{
  display:flex;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:3px;margin-bottom:22px;gap:3px;
}
.auth-tab{
  flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;
  font-size:13px;color:var(--text3);transition:all var(--transition);font-weight:600;
}
.auth-tab.on{
  background:var(--bg2);color:var(--text);
  border:1px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.err-box{
  display:flex;align-items:flex-start;gap:8px;padding:10px 13px;
  background:rgba(240,86,86,.08);border:1px solid rgba(240,86,86,.2);
  border-radius:8px;font-size:12px;color:var(--red);margin-top:10px;
}
.ok-box{
  padding:10px 13px;background:rgba(31,217,160,.08);
  border:1px solid rgba(31,217,160,.2);border-radius:8px;
  font-size:12px;color:var(--green);margin-top:10px;
}
.auth-footer{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}
.auth-footer a{color:var(--accent);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.strength-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all .3s}
.strength-label{font-size:10px;margin-top:3px}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar{
  width:240px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:width var(--transition);position:relative;z-index:10;
}
.sb-top{
  padding:14px 13px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.logo-text{font-size:14px;font-weight:800;letter-spacing:-.4px;flex:1}
.logo-text span{color:var(--accent)}

.search-wrap{padding:8px 10px;border-bottom:1px solid var(--border)}
.search-inp{
  width:100%;padding:7px 10px 7px 30px;background:var(--bg3);
  border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:12px;font-family:inherit;outline:none;
  transition:all var(--transition);position:relative;
}
.search-inp:focus{border-color:var(--border2)}
.search-inp::placeholder{color:var(--text3)}
.search-box{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;color:var(--text3)}

.user-row{
  display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background var(--transition);
}
.user-row:hover{background:var(--bg3)}
.ava{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
  position:relative;
}
.ava-lg{width:38px;height:38px;border-radius:10px;font-size:16px}
.ava-xl{width:50px;height:50px;border-radius:13px;font-size:22px}
.ava-badge{
  position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;
  border-radius:50%;background:var(--green);
  border:2px solid var(--bg2);
}
.uname{font-size:13px;font-weight:600;color:var(--text)}
.status-text{font-size:10px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.online-dot{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--green)}
.online-dot::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block}

.rooms-list{flex:1;overflow-y:auto;padding:6px 8px}
.sec-label{
  padding:8px 6px 3px;font-size:10px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.7px;
  display:flex;align-items:center;justify-content:space-between;
}
.room-li{
  display:flex;align-items:center;gap:7px;padding:7px 9px;
  border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);
  margin-bottom:1px;transition:all var(--transition);position:relative;
}
.room-li:hover{background:var(--bg3);color:var(--text)}
.room-li.on{
  background:linear-gradient(135deg,rgba(61,142,240,.12),rgba(41,214,245,.06));
  color:var(--accent);
}
.room-li.on::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;background:var(--accent);border-radius:0 2px 2px 0;
}
.room-hash{color:var(--text3);font-weight:700;font-size:15px;flex-shrink:0}
.room-li.on .room-hash{color:var(--accent2)}
.rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.room-unread{
  min-width:18px;height:18px;border-radius:9px;padding:0 5px;
  background:var(--red);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.join-pill{
  font-size:9px;padding:1px 6px;border-radius:3px;
  background:rgba(61,142,240,.1);color:var(--accent);
  border:1px solid rgba(61,142,240,.2);font-weight:700;
}

.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}

/* ═══════════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.chat-header{
  padding:0 20px;height:54px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--bg2);
  flex-shrink:0;
}
.ch-info{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.ch-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap}
.ch-hash{color:var(--text3);font-size:17px}
.ch-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.ch-desc{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.members-count{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;padding:0 4px}

/* ═══════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════ */
.msgs-wrap{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:0}
.msg{
  display:flex;gap:12px;padding:5px 10px;border-radius:10px;
  transition:background var(--transition);position:relative;
}
.msg:hover{background:rgba(255,255,255,.025)}
[data-theme="light"] .msg:hover{background:rgba(0,0,0,.025)}
.msg.pinned{
  background:rgba(245,183,49,.04);border-left:2px solid var(--yellow);
  border-radius:0 10px 10px 0;padding-left:8px;
}
.msg-left{flex-shrink:0;padding-top:3px}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:700;cursor:pointer}
.msg-name:hover{text-decoration:underline}
.msg-name.owner{color:var(--yellow)}
.msg-name.vice_owner{color:var(--green)}
.role-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.4px}
.rt-owner{background:rgba(245,183,49,.12);color:var(--yellow);border:1px solid rgba(245,183,49,.2)}
.rt-vice{background:rgba(31,217,160,.12);color:var(--green);border:1px solid rgba(31,217,160,.2)}
.msg-time{font-size:10px;color:var(--text3)}
.msg-text{font-size:13px;line-height:1.75;color:var(--text);word-break:break-word}
.msg-text strong{font-weight:700;color:#fff}
[data-theme="light"] .msg-text strong{color:#000}
.msg-text em{font-style:italic;color:var(--text2)}
.msg-text u{text-decoration:underline;text-underline-offset:2px}
.msg-text del{text-decoration:line-through;opacity:.5}
.mention{color:var(--accent2);background:rgba(41,214,245,.1);border-radius:3px;padding:0 3px;font-weight:600;cursor:pointer}
.mention:hover{background:rgba(41,214,245,.2)}
.code-inline{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--bg4);border:1px solid var(--border);
  padding:1px 5px;border-radius:4px;color:var(--accent2);
}
.code-block{
  font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-top:5px;
  overflow-x:auto;color:#7deda4;white-space:pre;
}
[data-theme="light"] .code-block{color:#1a7a3a}
.msg-actions{
  position:absolute;right:10px;top:4px;
  display:none;gap:3px;align-items:center;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:3px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.msg:hover .msg-actions{display:flex}
.msg-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.file-chip{
  display:flex;align-items:center;gap:7px;padding:7px 11px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;font-size:12px;color:var(--text2);
  text-decoration:none;cursor:pointer;transition:all var(--transition);
}
.file-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accentGlow)}
.file-sz{font-size:10px;color:var(--text3)}

.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.reaction{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:12px;cursor:pointer;
  font-size:12px;background:var(--bg3);border:1px solid var(--border);
  transition:all var(--transition);
}
.reaction:hover{border-color:var(--accent);background:var(--accentGlow)}
.reaction.mine{border-color:var(--accent);background:var(--accentGlow);color:var(--accent)}
.reaction-count{font-size:11px;font-weight:600;color:var(--text2)}

.emoji-picker{
  position:fixed;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:10px;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.ep-btn{
  width:36px;height:36px;border-radius:7px;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;transition:background var(--transition);
}
.ep-btn:hover{background:var(--bg3)}

.date-div{
  display:flex;align-items:center;gap:10px;padding:12px 0 6px;
  color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border)}

.pinned-banner{
  display:flex;align-items:center;gap:8px;padding:6px 16px;
  background:rgba(245,183,49,.07);border-bottom:1px solid rgba(245,183,49,.15);
  font-size:12px;color:var(--yellow);cursor:pointer;
  transition:background var(--transition);flex-shrink:0;
}
.pinned-banner:hover{background:rgba(245,183,49,.12)}

.typing-bar{
  padding:4px 16px;font-size:11px;color:var(--text3);
  min-height:22px;display:flex;align-items:center;gap:6px;
}
.typing-dots{display:flex;gap:3px}
.typing-dot{
  width:4px;height:4px;border-radius:50%;background:var(--text3);
  animation:tdot 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* ═══════════════════════════════════════════
   INPUT AREA
═══════════════════════════════════════════ */
.inp-area{
  padding:10px 16px 14px;border-top:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
.reply-preview{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:var(--bg3);border-radius:7px 7px 0 0;
  border:1px solid var(--border);border-bottom:none;
  font-size:12px;color:var(--text2);
}
.rp-bar{width:3px;height:100%;background:var(--accent);border-radius:2px;flex-shrink:0;align-self:stretch}
.rp-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-item{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  font-size:11px;color:var(--text2);
}
.fp-rm{cursor:pointer;color:var(--red);font-size:13px;margin-left:2px;opacity:.7;line-height:1}
.fp-rm:hover{opacity:1}
.inp-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;display:flex;align-items:flex-end;gap:8px;
  padding:10px 13px;transition:border-color var(--transition);
}
.inp-box:focus-within{border-color:var(--border2);box-shadow:0 0 0 3px var(--accentGlow)}
.inp-tools{display:flex;align-items:center;gap:3px;flex-shrink:0}
.chat-ta{
  flex:1;background:transparent;border:none;color:var(--text);
  font-size:13px;resize:none;outline:none;max-height:150px;
  overflow-y:auto;font-family:inherit;line-height:1.65;
}
.chat-ta::placeholder{color:var(--text3)}
.inp-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.cc{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums}
.cc.warn{color:var(--yellow)}.cc.over{color:var(--red)}
.inp-hint{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;font-size:10px;color:var(--text3);
}

function esc(s){
  if(s==null)return '';

/* ══════════════════════════════════════════
   TEXT FORMATTING
══════════════════════════════════════════ */
function fmt(text, searchQ){
  if(!text)return '';
  const toks=[];
  const colorPat=new RegExp('<('+COLORS.join('|')+'|#[0-9a-fA-F]{6})>"([^"\\n]*?)"','g');
  text=text.replace(colorPat,(_,color,content)=>{const idx=toks.length;toks.push({color,content});return '\x01'+idx+'\x01';});
  text=esc(text);
  // code blocks ```
  text=text.replace(/```([^`]+?)```/g,(_, code)=>`<div class="code-block">${esc(code)}</div>`);
  // inline code `
  text=text.replace(/`([^`\n]+?)`/g,'<span class="code-inline">$1</span>');
  // bold+italic ***
  text=text.replace(/\*\*\*([^\n*]{1,300}?)\*\*\*/g,'<strong><em>$1</em></strong>');
  // bold **
  text=text.replace(/\*\*([^\n*]{1,300}?)\*\*/g,'<strong>$1</strong>');
  // underline _* *_
  text=text.replace(/_\*([^\n]{1,300}?)\*_/g,'<u>$1</u>');
  // italic _
  text=text.replace(/_([^\n_]{1,300}?)_/g,'<em>$1</em>');
  // strikethrough -
  text=text.replace(/(?<![a-zA-Z0-9\u3131-\uD79D])-([^\n\-]{1,200}?)-(?![a-zA-Z0-9\u3131-\uD79D])/g,'<del>$1</del>');
  // mentions @username
  text=text.replace(/@([a-zA-Z0-9가-힣_()\-]{2,20})/g,'<span class="mention">@$1</span>');
  // color tokens
  toks.forEach(({color,content},idx)=>{
    let inner=esc(content);
    inner=inner.replace(/\*\*([^\n*]+?)\*\*/g,'<strong>$1</strong>');
    inner=inner.replace(/_([^\n_]+?)_/g,'<em>$1</em>');
    text=text.split('\x01'+idx+'\x01').join(`<span style="color:${esc(color)}">${inner}</span>`);
  });
  // search highlight
  if(searchQ){
    const re=new RegExp('('+esc(searchQ).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    text=text.replace(re,'<span class="highlight">$1</span>');
  }
  return text.replace(/\n/g,'<br>');
}

async function signUp(email,pw,uname){
  S.authErr='';S.authOk='';
  if(/\s/.test(uname)){S.authErr='닉네임에 공백을 사용할 수 없습니다.';render();return;}
  if(!/^[a-zA-Z0-9가-힣_()\-]{2,20}$/.test(uname)){
    S.authErr='닉네임: 2~20자, 한글/영문/숫자와 _ ( ) - 만 사용 가능';render();return;
  }
  if(pw.length<6){S.authErr='비밀번호는 6자 이상이어야 합니다.';render();return;}
  const {data:ex}=await SB.from('profiles').select('id').eq('username',uname).maybeSingle();
  if(ex){S.authErr='이미 사용 중인 닉네임입니다.';render();return;}
  // check device fingerprint ban
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){S.authErr='이 기기는 가입이 제한되어 있습니다.';render();return;}
  const {data,error}=await SB.auth.signUp({email,password:pw});
  if(error){S.authErr=error.message;render();return;}
  if(data?.user){
    await SB.from('profiles').insert({id:data.user.id,username:uname,ava_color:AVA_COLORS[0]});
    S.user=data.user;
    S.profile={id:data.user.id,username:uname,ava_color:AVA_COLORS[0]};
    await loadRooms();
    render();toast('가입 완료! 환영합니다 '+uname+'! 🎉');

    S.authOk='확인 이메일을 발송했습니다. 이메일 인증 후 로그인하세요.';render();
  }
}

async function loadRooms(){
  const {data}=await SB.from('rooms').select('*').order('created_at',{ascending:false});
  S.rooms=data||[];
  if(S.user){
    const {data:m}=await SB.from('room_members').select('room_id').eq('user_id',S.user.id);
    S.joined=(m||[]).map(x=>x.room_id);
  }

async function createRoom(name,desc,tags){
  const {data,error}=await SB.from('rooms')
    .insert({name,description:desc,owner_id:S.user.id,tags})
    .select().single();
  if(error){toast('방 생성 실패: '+error.message,'error');return;}
  await SB.from('room_members').insert({room_id:data.id,user_id:S.user.id,role:'owner'});
  S.joined.push(data.id);S.rooms.unshift(data);S.modal=null;
  await enter(data);toast('# '+name+' 방이 개설되었습니다! 🎉');
}

async function handleRoomClick(id){
  if(S.joined.includes(id)){
    const r=S.rooms.find(x=>x.id===id);
    if(r)await enter(r);
  }else{await joinRoom(id);}
}

async function joinRoom(id){
  const room=S.rooms.find(r=>r.id===id);if(!room)return;
  // fingerprint ban check
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){toast('이 기기는 접근이 제한되어 있습니다.','error');return;}
  const {data:ban}=await SB.from('bans').select('*')
    .eq('room_id',id).eq('user_id',S.user.id).maybeSingle();
  if(ban){
    if(ban.permanent){toast('이 방에서 영구 차단되었습니다.','error');return;}
    if(ban.expires_at&&new Date(ban.expires_at)>new Date()){
      toast('차단 중: '+new Date(ban.expires_at).toLocaleString('ko-KR')+'까지','error');return;
    }
    await SB.from('bans').delete().eq('id',ban.id);
  }
  const {data:ex}=await SB.from('room_members').select('id')
    .eq('room_id',id).eq('user_id',S.user.id).maybeSingle();
  if(!ex){
    await SB.from('room_members').insert({room_id:id,user_id:S.user.id,role:'member'});
    S.joined.push(id);
  }
  await enter(room);toast('# '+room.name+' 에 입장했습니다!');
}

async function enter(room){
  cleanup();
  S.room=room;S.msgs=[];S.members=[];S.bans=[];S.myRole=null;
  S.pinnedMsg=null;S.replyTo=null;S.onlineUsers={};
  delete S.unread[room.id];
  render();
  await Promise.all([loadMsgs(room.id),loadMembers(room.id),loadBans(room.id),loadPinned(room.id)]);
  const {data:me}=await SB.from('room_members').select('role')
    .eq('room_id',room.id).eq('user_id',S.user.id).maybeSingle();
  S.myRole=me?.role||'member';
  // realtime messages
  S.channel=SB.channel('room-'+room.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},async(e)=>{
      if(S.msgs.find(m=>m.id===e.new.id))return;
      setTimeout(async()=>{
        const {data:m}=await SB.from('messages')
          .select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)')
          .eq('id',e.new.id).maybeSingle();
        if(!m||S.msgs.find(x=>x.id===m.id))return;
        m.files=(m.files||[]).filter(f=>new Date(f.expires_at)>new Date());
        S.msgs.push(m);
        renderMsgs();scrollBot();
        // ping if mentioned
        const un=S.profile?.username||'';
        if(un&&m.content&&m.content.includes('@'+un)&&m.user_id!==S.user.id){
          toast('@멘션되었습니다: '+m.profiles?.username,'info');
          try{new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA').play().catch(()=>{});}catch(e){}
        }
      },600);
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},async(e)=>{
      const idx=S.msgs.findIndex(m=>m.id===e.new.id);
      if(idx!==-1){
        const {data:m}=await SB.from('messages')
          .select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)')
          .eq('id',e.new.id).maybeSingle();
        if(m){
          m.files=(m.files||[]).filter(f=>new Date(f.expires_at)>new Date());
          S.msgs[idx]=m;renderMsgs();
        }
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:'room_id=eq.'+room.id},(e)=>{
      S.msgs=S.msgs.filter(m=>m.id!==e.old.id);renderMsgs();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'reactions',filter:'room_id=eq.'+room.id},()=>{
      setTimeout(()=>{loadMsgsReactions();},300);
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'reactions',filter:'room_id=eq.'+room.id},()=>{
      setTimeout(()=>{loadMsgsReactions();},300);
    })
    .subscribe();
  // presence
  S.presenceChannel=SB.channel('presence-'+room.id,{config:{presence:{key:S.user.id}}})
    .on('presence',{event:'sync'},()=>{
      const state=S.presenceChannel.presenceState();
      S.onlineUsers={};
      Object.keys(state).forEach(k=>{if(state[k][0])S.onlineUsers[k]=state[k][0];});
      renderMemberPanel();
    })
    .subscribe(async(status)=>{
      if(status==='SUBSCRIBED'){
        await S.presenceChannel.track({user_id:S.user.id,username:S.profile?.username,online_at:Date.now()});
      }
    });
  render();
  setTimeout(scrollBot,200);
}

async function leaveRoom(){
  if(S.myRole==='owner'){toast('방장은 방을 나갈 수 없습니다.','error');return;}
  await SB.from('room_members').delete().eq('room_id',S.room.id).eq('user_id',S.user.id);
  S.joined=S.joined.filter(id=>id!==S.room.id);
  const name=S.room.name;cleanup();
  S.room=null;S.msgs=[];S.members=[];S.myRole=null;
  await loadRooms();render();toast('# '+name+' 에서 나갔습니다.');
}

async function updateRoom(name,desc,tags){
  const {error}=await SB.from('rooms').update({name,description:desc,tags}).eq('id',S.room.id);
  if(error){toast('업데이트 실패: '+error.message,'error');return;}

async function deleteRoom(){

async function loadMsgs(roomId){
  const {data}=await SB.from('messages')
    .select('*, profiles!messages_user_id_fkey(username,ava_color), files(*), reactions(*)')
    .eq('room_id',roomId).order('created_at',{ascending:true}).limit(80);
  const now=new Date();
  S.msgs=(data||[]).map(m=>({...m,files:(m.files||[]).filter(f=>new Date(f.expires_at)>now)}));
}

async function loadMsgsReactions(){
  if(!S.room)return;
  const ids=S.msgs.map(m=>m.id);
  if(!ids.length)return;
  const {data}=await SB.from('reactions').select('*').in('message_id',ids);
  S.msgs=S.msgs.map(m=>({...m,reactions:(data||[]).filter(r=>r.message_id===m.id)}));
  renderMsgs();
}

async function loadPinned(roomId){
  const {data}=await SB.from('messages')
    .select('*, profiles!messages_user_id_fkey(username,ava_color)')
    .eq('room_id',roomId).eq('is_pinned',true).maybeSingle();
  S.pinnedMsg=data||null;
}

async function pinMsg(id,val){
  if(S.pinnedMsg&&S.pinnedMsg.id!==id){
    await SB.from('messages').update({is_pinned:false}).eq('id',S.pinnedMsg.id);
  }
  await SB.from('messages').update({is_pinned:val}).eq('id',id);
  await loadPinned(S.room.id);
  S.msgs=S.msgs.map(m=>({...m,is_pinned:m.id===id?val:(m.id===S.pinnedMsg?.id?false:m.is_pinned)}));
  renderMsgs();renderPinned();
  toast(val?'📌 메시지가 고정되었습니다.':'고정 해제되었습니다.');
}

async function sendMsg(){
  if(S.sending)return;
  const el=document.getElementById('ci');
  const text=el?.value?.trim()||'';
  if(!text&&S.files.length===0)return;
  if(text.length>MAX_MSG){toast('메시지는 '+MAX_MSG+'자 이내로 작성하세요.','error');return;}
  const now=Date.now();
  const wait=Math.ceil((COOLDOWN-(now-S.lastSend))/1000);
  if(now-S.lastSend<COOLDOWN){toast(wait+'초 후에 보낼 수 있습니다.','error');return;}
  const {data:ban}=await SB.from('bans').select('*')
    .eq('room_id',S.room.id).eq('user_id',S.user.id).maybeSingle();
  if(ban&&(ban.permanent||(ban.expires_at&&new Date(ban.expires_at)>new Date()))){
    toast('차단된 상태에서는 메시지를 보낼 수 없습니다.','error');return;
  }
  // fingerprint ban
  const {data:fpBan}=await SB.from('device_bans').select('id').eq('fingerprint',FINGERPRINT).maybeSingle();
  if(fpBan){toast('이 기기는 메시지 전송이 제한되어 있습니다.','error');return;}
  S.sending=true;S.lastSend=now;
  const btnEl=document.getElementById('send-btn');
  if(btnEl){btnEl.textContent='전송 중…';btnEl.disabled=true;}
  const insertData={
    room_id:S.room.id,user_id:S.user.id,
    content:text||(S.files.length>0?'(파일 첨부)':''),
  };
  if(S.replyTo)insertData.reply_to=S.replyTo.id;
  const {data:msg,error}=await SB.from('messages').insert(insertData).select().single();
  if(error){toast('전송 실패: '+error.message,'error');S.sending=false;if(btnEl){btnEl.textContent='전송 ↵';btnEl.disabled=false;}return;}
  if(S.files.length>0)await uploadFiles(msg.id,[...S.files]);
  S.files=[];S.replyTo=null;
  if(el){el.value='';el.style.height='auto';}
  updateCC('');
  const fp=document.getElementById('fp');if(fp)fp.innerHTML='';
  const rp=document.getElementById('rp');if(rp)rp.remove();
  S.sending=false;
  if(btnEl){btnEl.textContent='전송 ↵';btnEl.disabled=false;}
}

async function delMsg(id){
  if(!confirm('이 메시지를 삭제하시겠습니까?'))return;
  await SB.from('messages').delete().eq('id',id);
  S.msgs=S.msgs.filter(m=>m.id!==id);renderMsgs();
}

async function reactMsg(msgId,emoji){
  closeEmojiPicker();
  const existing=S.msgs.find(m=>m.id===msgId)?.reactions?.find(r=>r.user_id===S.user.id&&r.emoji===emoji);
  if(existing){
    await SB.from('reactions').delete().eq('id',existing.id);
  }else{
    await SB.from('reactions').insert({message_id:msgId,user_id:S.user.id,emoji,room_id:S.room.id});
  }
}

function openEmojiPicker(msgId,x,y){
  S.emojiPicker={msgId,x,y};
  let ep=document.getElementById('ep');
  if(!ep){
    ep=document.createElement('div');
    ep.id='ep';ep.className='emoji-picker';
    document.body.appendChild(ep);
  }
  ep.innerHTML=`<div class="emoji-grid">${EMOJIS.map(e=>`<button class="ep-btn" onclick="reactMsg('${msgId}','${e}')">${e}</button>`).join('')}</div>`;
  // position
  const pw=200,ph=130;
  let px=x,py=y;
  if(px+pw>window.innerWidth)px=window.innerWidth-pw-10;
  if(py+ph>window.innerHeight)py=y-ph-10;
  ep.style.left=px+'px';ep.style.top=py+'px';
  ep.style.display='block';
  const closer=(e)=>{if(!ep.contains(e.target)){closeEmojiPicker();document.removeEventListener('click',closer);}};
  setTimeout(()=>document.addEventListener('click',closer),50);
}

function closeEmojiPicker(){
  const ep=document.getElementById('ep');
  if(ep)ep.style.display='none';
  S.emojiPicker=null;
}

function setReply(msg){
  S.replyTo=msg;
  const ia=document.querySelector('.inp-area');
  if(!ia)return;
  let rp=document.getElementById('rp');
  if(!rp){
    rp=document.createElement('div');rp.id='rp';rp.className='reply-preview';
    ia.insertBefore(rp,ia.querySelector('.file-pre'));

    <div class="rp-text"><span style="color:var(--text2);font-weight:600">@${esc(msg.profiles?.username||'?')}</span>: ${esc((msg.content||'').slice(0,60))}</div>
    <button class="btn btn-ghost btn-xs" onclick="S.replyTo=null;this.parentElement.remove()">✕</button>`;

}

async function searchMsgs(q){
  S.search=q;
  if(!q||q.length<2){S.searchResults=[];S.searchOpen=!!q;renderSearch();return;}
  S.searchOpen=true;
  const {data}=await SB.from('messages')
    .select('*, profiles!messages_user_id_fkey(username,ava_color)')
    .eq('room_id',S.room.id).ilike('content','%'+q+'%').limit(30).order('created_at',{ascending:false});
  S.searchResults=data||[];
  renderSearch();
}

function renderSearch(){
  const existing=document.getElementById('search-panel');
  if(!S.searchOpen||!S.room){if(existing)existing.remove();return;}
  const results=S.searchResults;
  const html=results.length===0
    ?`<div class="empty" style="margin-top:60px"><div class="empty-icon">🔍</div><div class="empty-t">검색 결과 없음</div><div class="empty-s">"${esc(S.search)}"에 대한 메시지가 없습니다</div></div>`
    :results.map(m=>`
      <div class="search-result-item" onclick="jumpToMsg('${m.id}')">
        <div class="ava" style="background:${avaBg(m.profiles?.username,m.profiles?.ava_color)}">${(m.profiles?.username||'?')[0].toUpperCase()}</div>
        <div class="sr-content">
          <div class="sr-author">${esc(m.profiles?.username||'?')}</div>
          <div class="sr-text">${fmt(m.content,S.search)}</div>
          <div class="sr-meta">${ftime(m.created_at)}</div>
        </div>
      </div>`).join('');
  if(!existing){
    const panel=document.createElement('div');panel.id='search-panel';panel.className='search-panel';
    panel.innerHTML=`<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">${results.length}개의 결과 — "${esc(S.search)}"</span>
      <button class="btn btn-ghost btn-sm" onclick="S.searchOpen=false;S.search='';document.getElementById('search-panel')?.remove()">닫기</button>
    </div><div class="search-results">${html}</div>`;
    const main=document.querySelector('.main');
    if(main)main.style.position='relative',main.appendChild(panel);
  }else{
    existing.querySelector('.search-results').innerHTML=html;
    existing.querySelector('span').textContent=results.length+'개의 결과 — "'+S.search+'"';
  }
}

function jumpToMsg(id){
  S.searchOpen=false;document.getElementById('search-panel')?.remove();
  const el=document.getElementById('m-'+id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(245,183,49,.12)';setTimeout(()=>{el.style.background='';},2000);}
}

async function uploadFiles(msgId,files){
  for(const file of files){
    const safe=file.name.replace(/[^a-zA-Z0-9._\-]/g,'_');
    const path=S.room.id+'/'+msgId+'/'+Date.now()+'_'+safe;
    const {error:ue}=await SB.storage.from(BUCKET).upload(path,file);
    if(ue){console.error('Upload error:',ue);continue;}
    const {data:{publicUrl}}=SB.storage.from(BUCKET).getPublicUrl(path);
    await SB.from('files').insert({
      room_id:S.room.id,message_id:msgId,user_id:S.user.id,
      file_name:file.name,file_url:publicUrl,file_size:file.size,
      expires_at:new Date(Date.now()+FILE_TTL).toISOString()
    });
  }
}

function pickFiles(e){
  const chosen=Array.from(e.target.files);
  const room=MAX_FILES-S.files.length;let added=0;
  for(const f of chosen){
    if(added>=room){toast('파일은 최대 '+MAX_FILES+'개까지 첨부 가능합니다.','error');break;}
    const ext='.'+((f.name.split('.').pop()||'').toLowerCase());
    if(!EXTS.includes(ext)){toast('허용되지 않는 형식: '+f.name,'error');continue;}
    if(f.size>MAX_FILE){toast('100MB 초과: '+f.name,'error');continue;}
    S.files.push(f);added++;
  }
  e.target.value='';renderFilePre();
}
function rmFile(i){S.files.splice(i,1);renderFilePre();}
function renderFilePre(){
  const el=document.getElementById('fp');if(!el)return;
  el.style.display=S.files.length?'flex':'none';
  el.innerHTML=S.files.map((f,i)=>`
    <div class="fp-item">${ficon(f.name)} ${esc(f.name)}
      <span style="color:var(--text3)">${fsize(f.size)}</span>
      <span class="fp-rm" onclick="rmFile(${i})">✕</span>
    </div>`).join('');
}

async function loadMembers(roomId){

async function loadBans(roomId){

    .select('*, profiles!bans_user_id_fkey(username)').eq('room_id',roomId);
  S.bans=data||[];
}

async function banUser(uid,uname,perm,hours,deviceBan){
  const exp=perm?null:new Date(Date.now()+hours*3600000).toISOString();
  const {error}=await SB.from('bans').upsert(
    {room_id:S.room.id,user_id:uid,banned_by:S.user.id,permanent:perm,expires_at:exp},
    {onConflict:'room_id,user_id'}
  );
  if(error){toast('차단 실패: '+error.message,'error');return;}
  await SB.from('room_members').delete().eq('room_id',S.room.id).eq('user_id',uid);
  // device ban
  if(deviceBan){
    // get user's fingerprint from device_sessions table
    const {data:sess}=await SB.from('device_sessions').select('fingerprint').eq('user_id',uid).maybeSingle();
    if(sess?.fingerprint){
      await SB.from('device_bans').upsert({fingerprint:sess.fingerprint,banned_by:S.user.id,user_id:uid},{onConflict:'fingerprint'});
    }
  }
  S.members=S.members.filter(m=>m.user_id!==uid);
  await loadBans(S.room.id);
  S.modal={t:'mb'};render();
  toast(uname+' '+(perm?'영구 차단':'기간 차단')+(deviceBan?' + 기기 차단':'')+' 완료');
}

async function unban(uid,uname){
  await SB.from('bans').delete().eq('room_id',S.room.id).eq('user_id',uid);
  await SB.from('device_bans').delete().eq('user_id',uid);
  S.bans=S.bans.filter(b=>b.user_id!==uid);render();toast(uname+' 차단 해제 완료');
}

async function setVice(uid,makeVice){
  const role=makeVice?'vice_owner':'member';
  await SB.from('room_members').update({role}).eq('room_id',S.room.id).eq('user_id',uid);
  S.members=S.members.map(m=>m.user_id===uid?{...m,role}:m);
  render();toast(makeVice?'⭐ 부방장 지정 완료':'부방장 해제 완료');
}

async function updateProfile(statusMsg,avaColor){
  const {error}=await SB.from('profiles').update({status_msg:statusMsg,ava_color:avaColor}).eq('id',S.user.id);
  if(error){toast('업데이트 실패','error');return;}
  S.profile={...S.profile,status_msg:statusMsg,ava_color:avaColor};
  S.modal=null;render();toast('프로필이 업데이트되었습니다.');
}

function showPwStrength(pw){
  const sf=document.getElementById('sf'),sl=document.getElementById('sl');
  if(!sf||!sl)return;
  let score=0;
  if(pw.length>=8)score++;if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^a-zA-Z0-9]/.test(pw))score++;
  const levels=[
    {w:'20%',color:'var(--red)',label:'매우 약함'},
    {w:'40%',color:'var(--orange)',label:'약함'},
    {w:'60%',color:'var(--yellow)',label:'보통'},
    {w:'80%',color:'var(--accent)',label:'강함'},
    {w:'100%',color:'var(--green)',label:'매우 강함'},
  ];
  const lv=levels[Math.max(0,Math.min(score-1,4))]||levels[0];
  sf.style.width=lv.w;sf.style.background=lv.color;sl.textContent=lv.label;sl.style.color=lv.color;
}
function bindAuth(){
  const theme=localStorage.getItem('adc-theme')||'dark';
  S.theme=theme;document.body.setAttribute('data-theme',theme);
  setTimeout(()=>document.getElementById('ae')?.focus(),50);
}
function doAuth(){
  const email=document.getElementById('ae')?.value?.trim();
  const pw=document.getElementById('ap')?.value||'';
  if(S.authTab==='in'){
    if(!email||!pw){S.authErr='이메일과 비밀번호를 입력하세요.';render();return;}
    signIn(email,pw);

    if(!email||!pw||!uname){S.authErr='모든 필드를 입력하세요.';render();return;}
    signUp(email,pw,uname);
  }
}

function handleKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function handleMention(ta){
  const v=ta.value,pos=ta.selectionStart;
  const before=v.slice(0,pos);
  const m=before.match(/@([a-zA-Z0-9가-힣_()\-]*)$/);
  if(m){
    const q=m[1].toLowerCase();
    const matches=S.members.filter(mem=>mem.profiles?.username?.toLowerCase().includes(q)&&mem.user_id!==S.user.id).slice(0,5);
    showMentionSuggestions(matches,ta);
  }else{
    closeMentionSuggestions();
  }
}

function showMentionSuggestions(members,ta){
  let box=document.getElementById('mention-box');
  if(!box){
    box=document.createElement('div');box.id='mention-box';
    box.className='tag-suggestions';
    box.style.cssText='position:fixed;z-index:100;min-width:200px;';
    document.body.appendChild(box);
  }
  const rect=ta.getBoundingClientRect();
  box.style.bottom=(window.innerHeight-rect.top+4)+'px';
  box.style.left=rect.left+'px';
  if(!members.length){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=members.map(m=>`
    <div class="tag-sug-item" onclick="insertMention('${esc(m.profiles?.username||'')}')">
      <span style="font-weight:600">@${esc(m.profiles?.username||'')}</span>
      <span style="color:var(--text3);font-size:10px;margin-left:6px">${esc(m.role)}</span>
    </div>`).join('');
}

function closeMentionSuggestions(){
  const b=document.getElementById('mention-box');if(b)b.style.display='none';
}

function insertMention(username){
  const ta=document.getElementById('ci');if(!ta)return;
  const v=ta.value,pos=ta.selectionStart;
  const before=v.slice(0,pos);
  const after=v.slice(pos);
  const newBefore=before.replace(/@[a-zA-Z0-9가-힣_()\-]*$/,'@'+username+' ');
  ta.value=newBefore+after;
  ta.focus();ta.setSelectionRange(newBefore.length,newBefore.length);
  closeMentionSuggestions();
}

let selectedTags=[];
function toggleTag(el,tag){
  if(el.classList.contains('filter-active')){
    el.classList.remove('filter-active');
    selectedTags=selectedTags.filter(t=>t!==tag);
  }else{
    el.classList.add('filter-active');
    selectedTags.push(tag);
  }
}
function getSelectedTags(){
  return Array.from(document.querySelectorAll('#tag-cloud .tag-chip.filter-active')).map(el=>el.textContent);
}

function doCreateRoom(){
  const name=document.getElementById('mr-n')?.value?.trim();
  const desc=document.getElementById('mr-d')?.value?.trim()||'';
  if(!name){toast('방 이름을 입력하세요.','error');return;}
  const tags=getSelectedTags();
  createRoom(name,desc,tags);
}
function doUpdateRoom(){
  const name=document.getElementById('rs-n')?.value?.trim();
  const desc=document.getElementById('rs-d')?.value?.trim()||'';
  if(!name){toast('방 이름을 입력하세요.','error');return;}
  const tags=getSelectedTags();
  updateRoom(name,desc,tags);
}
function doBan(uid,un){
  const perm=document.querySelector('input[name="bt"]:checked')?.value==='perm';
  const hours=parseInt(document.getElementById('bh')?.value||'24');

  if(!perm&&(isNaN(hours)||hours<1)){toast('유효한 시간을 입력하세요.','error');return;}
  banUser(uid,un,perm,hours,deviceBan);
}
function selectAvaColor(el,color){

/* ══════════════════════════════════════════
   SETUP SQL
══════════════════════════════════════════ */
function getSetupSQL(){
return `-- ╔══════════════════════════════════════════╗
-- ║  AndroidDev Community v2 — DB Setup SQL  ║
-- ╚══════════════════════════════════════════╝

-- 1. profiles
CREATE TABLE IF NOT EXISTS profiles (
  id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
  username TEXT UNIQUE NOT NULL,
  status_msg TEXT DEFAULT '',
  ava_color TEXT DEFAULT '#3d8ef0',
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 2. rooms
CREATE TABLE IF NOT EXISTS rooms (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  name TEXT NOT NULL,
  description TEXT DEFAULT '',
  owner_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  tags TEXT[] DEFAULT '{}',
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 3. room_members
CREATE TABLE IF NOT EXISTS room_members (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  role TEXT NOT NULL DEFAULT 'member',
  joined_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(room_id, user_id)
);

-- 4. messages
CREATE TABLE IF NOT EXISTS messages (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  content TEXT NOT NULL,
  reply_to UUID REFERENCES messages(id) ON DELETE SET NULL,
  is_pinned BOOLEAN DEFAULT FALSE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 5. files
CREATE TABLE IF NOT EXISTS files (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  message_id UUID NOT NULL REFERENCES messages(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  file_name TEXT NOT NULL,
  file_url TEXT NOT NULL,
  file_size BIGINT NOT NULL,
  expires_at TIMESTAMPTZ DEFAULT (NOW() + INTERVAL '7 days'),
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 6. bans
CREATE TABLE IF NOT EXISTS bans (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  banned_by UUID REFERENCES profiles(id),
  permanent BOOLEAN NOT NULL DEFAULT FALSE,
  expires_at TIMESTAMPTZ,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(room_id, user_id)
);

-- 7. reactions
CREATE TABLE IF NOT EXISTS reactions (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  message_id UUID NOT NULL REFERENCES messages(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  emoji TEXT NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(message_id, user_id, emoji)
);

-- 8. device_sessions (기기 추적용)
CREATE TABLE IF NOT EXISTS device_sessions (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  fingerprint TEXT NOT NULL,
  last_seen TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id)
);

-- 9. device_bans (기기 차단)
CREATE TABLE IF NOT EXISTS device_bans (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  fingerprint TEXT NOT NULL UNIQUE,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  banned_by UUID REFERENCES profiles(id),
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 10. typing (타이핑 표시)
CREATE TABLE IF NOT EXISTS typing (
  room_id UUID NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
  username TEXT,
  ts BIGINT,
  PRIMARY KEY(room_id, user_id)
);

-- ── RLS 활성화 ──────────────────────────────
ALTER TABLE profiles       ENABLE ROW LEVEL SECURITY;
ALTER TABLE rooms          ENABLE ROW LEVEL SECURITY;
ALTER TABLE room_members   ENABLE ROW LEVEL SECURITY;
ALTER TABLE messages       ENABLE ROW LEVEL SECURITY;
ALTER TABLE files          ENABLE ROW LEVEL SECURITY;
ALTER TABLE bans           ENABLE ROW LEVEL SECURITY;
ALTER TABLE reactions      ENABLE ROW LEVEL SECURITY;
ALTER TABLE device_sessions ENABLE ROW LEVEL SECURITY;
ALTER TABLE device_bans    ENABLE ROW LEVEL SECURITY;
ALTER TABLE typing         ENABLE ROW LEVEL SECURITY;

-- ── RLS 정책 ────────────────────────────────
DO $$ BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='profiles'        AND policyname='auth_all') THEN CREATE POLICY auth_all ON profiles        FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='rooms'           AND policyname='auth_all') THEN CREATE POLICY auth_all ON rooms           FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='room_members'    AND policyname='auth_all') THEN CREATE POLICY auth_all ON room_members    FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='messages'        AND policyname='auth_all') THEN CREATE POLICY auth_all ON messages        FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='files'           AND policyname='auth_all') THEN CREATE POLICY auth_all ON files           FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='bans'            AND policyname='auth_all') THEN CREATE POLICY auth_all ON bans            FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='reactions'       AND policyname='auth_all') THEN CREATE POLICY auth_all ON reactions       FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='device_sessions' AND policyname='auth_all') THEN CREATE POLICY auth_all ON device_sessions FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='device_bans'     AND policyname='auth_all') THEN CREATE POLICY auth_all ON device_bans     FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='typing'          AND policyname='auth_all') THEN CREATE POLICY auth_all ON typing          FOR ALL TO authenticated USING (true) WITH CHECK (true); END IF;
END $$;

-- ── Realtime 활성화 ──────────────────────────
ALTER PUBLICATION supabase_realtime ADD TABLE messages;
ALTER PUBLICATION supabase_realtime ADD TABLE reactions;
ALTER PUBLICATION supabase_realtime ADD TABLE typing;`;
}

async function init(){
  // theme
  const savedTheme=localStorage.getItem('adc-theme')||'dark';
  S.theme=savedTheme;document.body.setAttribute('data-theme',savedTheme);
  // auto-login
  const {data:{session}}=await SB.auth.getSession();
  if(session?.user){
    S.user=session.user;
    await loadProfile();
    await loadRooms();
    await trackSession();
  }
  SB.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_OUT'){
      cleanup();
      Object.assign(S,{user:null,profile:null,rooms:[],joined:[],room:null,
        msgs:[],members:[],bans:[],myRole:null,files:[],channel:null,
        presenceChannel:null,modal:null,onlineUsers:{},pinnedMsg:null,replyTo:null});
      render();
    }else if(event==='SIGNED_IN'&&session?.user){
      S.user=session.user;
      await loadProfile();
      await loadRooms();
      await trackSession();
      render();
    }
  });
  render();
}

init();
